<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GST 제조 현장 작업 관리 시스템">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="G-AXIS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>G-AXIS OPS</title>
  <link rel="manifest" href="manifest.json">

  <!-- Splash Screen Style -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #F5F5F7;
    }

    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #F5F5F7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.4s ease-out;
    }

    #splash-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #splash-logo {
      width: 200px;
      height: auto;
      object-fit: contain;
      margin-bottom: 28px;
      animation: logo-pulse 2s ease-in-out infinite;
    }

    #splash-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #8E8E93;
      letter-spacing: 0.5px;
    }

    #splash-loader {
      margin-top: 32px;
      width: 36px;
      height: 36px;
      border: 3px solid #E5E5EA;
      border-top: 3px solid #6366F1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes logo-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.85; transform: scale(0.97); }
    }
  </style>
</head>
<body>
  <!-- Splash Screen: Flutter 엔진 로딩 중 표시 -->
  <div id="splash-screen">
    <img id="splash-logo" src="img/g-axis-splash.png" alt="G-AXIS">
    <div id="splash-text">Loading...</div>
    <div id="splash-loader"></div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="flutter_bootstrap.js" async></script>

  <!-- Flutter 엔진 로드 완료 시 스플래시 제거 -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash-screen');
      if (splash) {
        splash.classList.add('fade-out');
        setTimeout(function () {
          splash.remove();
        }, 400);
      }
    });
  </script>
</body>
</html>
