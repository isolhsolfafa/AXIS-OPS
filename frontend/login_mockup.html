<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>G-AXIS OPS | Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gx-charcoal: #2A2D35;
  --gx-graphite: #3D4150;
  --gx-slate: #5A5F72;
  --gx-steel: #8B90A0;
  --gx-silver: #B8BCC8;
  --gx-mist: #E8EAF0;
  --gx-cloud: #F3F4F7;
  --gx-white: #FFFFFF;

  --gx-accent: #6366F1;
  --gx-accent-soft: rgba(99, 102, 241, 0.08);
  --gx-accent-medium: rgba(99, 102, 241, 0.15);

  --gx-success: #10B981;

  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --radius-2xl: 24px;

  --shadow-glass: 0 8px 32px 0 rgba(99, 102, 241, 0.12);
  --shadow-glass-sm: 0 4px 16px 0 rgba(0, 0, 0, 0.06);
  --shadow-glass-lg: 0 16px 48px 0 rgba(99, 102, 241, 0.18);

  --border-glass: rgba(255, 255, 255, 0.25);
  --border-glass-light: rgba(255, 255, 255, 0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
  color: var(--gx-charcoal);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.2), transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.15), transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.1), transparent 60%);
  pointer-events: none;
  z-index: 0;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ─── Floating Orbs ─── */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.3;
  pointer-events: none;
  z-index: 0;
}
.orb-1 {
  width: 200px; height: 200px;
  background: rgba(99, 102, 241, 0.4);
  top: -60px; left: -40px;
  animation: float1 8s ease-in-out infinite;
}
.orb-2 {
  width: 160px; height: 160px;
  background: rgba(236, 72, 153, 0.3);
  bottom: -40px; right: -30px;
  animation: float2 10s ease-in-out infinite;
}
.orb-3 {
  width: 120px; height: 120px;
  background: rgba(59, 130, 246, 0.3);
  top: 40%; right: -20px;
  animation: float3 12s ease-in-out infinite;
}
@keyframes float1 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(30px, 20px); }
}
@keyframes float2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-20px, -30px); }
}
@keyframes float3 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-15px, 25px); }
}

/* ─── Container ─── */
.login-container {
  width: 100%;
  max-width: 400px;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}

/* ─── Brand Header — Logo Floating ─── */
.brand-header {
  text-align: center;
  animation: fadeInDown 0.6s cubic-bezier(0.4, 0, 0.2, 1) backwards;
}

.brand-logo-float {
  animation: logoFloat 3s ease-in-out infinite;
  margin-bottom: 14px;
}

@keyframes logoFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.brand-logo-float img {
  width: 180px;
  height: auto;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.15));
}

.brand-product {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.65);
  margin-top: 2px;
}

/* ─── Glass Card ─── */
.login-card {
  width: 100%;
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-2xl);
  padding: 36px 28px 32px;
  box-shadow: var(--shadow-glass-lg);
  animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s backwards;
}

.card-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--gx-charcoal);
  margin-bottom: 4px;
}

.card-subtitle {
  font-size: 13px;
  color: var(--gx-steel);
  margin-bottom: 28px;
}

/* ─── Form ─── */
.form-group { margin-bottom: 18px; }

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--gx-slate);
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}

.input-wrap { position: relative; }

.input-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gx-silver);
  pointer-events: none;
  transition: color 0.2s;
}

.form-input {
  width: 100%;
  height: 48px;
  padding: 0 16px 0 44px;
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1.5px solid var(--gx-mist);
  border-radius: var(--radius-lg);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--gx-charcoal);
  transition: all 0.2s ease;
  outline: none;
}

.form-input::placeholder { color: var(--gx-silver); }

.form-input:focus {
  border-color: var(--gx-accent);
  background: rgba(255, 255, 255, 0.85);
  box-shadow: 0 0 0 3px var(--gx-accent-medium);
}

.form-input:focus ~ .input-icon { color: var(--gx-accent); }

.input-icon-right {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gx-silver);
  cursor: pointer;
  transition: color 0.2s;
}
.input-icon-right:hover { color: var(--gx-slate); }

/* ─── Remember & Forgot ─── */
.form-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.checkbox-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

.checkbox-wrap input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border: 1.5px solid var(--gx-mist);
  border-radius: 5px;
  background: rgba(255, 255, 255, 0.6);
  cursor: pointer;
  position: relative;
  transition: all 0.15s;
}

.checkbox-wrap input[type="checkbox"]:checked {
  background: var(--gx-accent);
  border-color: var(--gx-accent);
}

.checkbox-wrap input[type="checkbox"]:checked::after {
  content: '';
  position: absolute;
  left: 5px; top: 2px;
  width: 5px; height: 9px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

.checkbox-label { font-size: 13px; color: var(--gx-slate); user-select: none; }

.forgot-link {
  font-size: 13px;
  font-weight: 500;
  color: var(--gx-accent);
  text-decoration: none;
  transition: opacity 0.15s;
}
.forgot-link:hover { opacity: 0.75; }

/* ─── Login Button ─── */
.login-btn {
  width: 100%;
  height: 50px;
  border: none;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, var(--gx-accent) 0%, #818CF8 100%);
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
  position: relative;
  overflow: hidden;
}

.login-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; right: 0; bottom: 0;
  width: 200%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transition: left 0.5s;
}

.login-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(99, 102, 241, 0.45);
}
.login-btn:hover::before { left: 100%; }

.login-btn:active {
  transform: translateY(0);
  box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
}

/* ─── Feature Badges ─── */
.feature-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  margin-top: 26px;
  padding-top: 22px;
  border-top: 1px solid var(--gx-mist);
}

.feature-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.feature-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.feature-icon.accent {
  background: var(--gx-accent-soft);
  color: var(--gx-accent);
}
.feature-icon.teal {
  background: rgba(16, 185, 129, 0.08);
  color: #10B981;
}
.feature-icon.blue {
  background: rgba(59, 130, 246, 0.08);
  color: #3B82F6;
}

.feature-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--gx-steel);
  letter-spacing: 0.3px;
  text-align: center;
  white-space: nowrap;
}

/* ─── Footer ─── */
.footer-section {
  text-align: center;
  animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.2s backwards;
}

.status-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 20px;
  padding: 8px 16px;
  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--border-glass);
  border-radius: 20px;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gx-success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
  50% { box-shadow: 0 0 0 4px rgba(16,185,129,0); }
}

.status-label {
  font-size: 11px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.6);
}

.register-text {
  font-size: 13px;
  color: rgba(255, 255, 255, 0.7);
}

.register-link {
  color: var(--gx-white);
  font-weight: 600;
  text-decoration: none;
  margin-left: 4px;
  transition: opacity 0.15s;
}
.register-link:hover { opacity: 0.8; }

.version-text {
  font-size: 11px;
  color: rgba(255, 255, 255, 0.35);
  margin-top: 14px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
}

/* ─── Animations ─── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── Responsive ─── */
@media (max-width: 375px) {
  body { padding: 20px 16px; }
  .login-card { padding: 28px 22px 26px; }
  .brand-logo-float img { width: 150px; }
  .feature-row { gap: 16px; }
}

@supports (padding-bottom: env(safe-area-inset-bottom)) {
  body { padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-container">

  <!-- Brand — Logo with floating motion -->
  <div class="brand-header">
    <div class="brand-logo-float">
      <img src="assets/images/g-axis-2.png" alt="G-AXIS">
    </div>
    <div class="brand-product">Manufacturing Operations</div>
  </div>

  <!-- Login Card -->
  <div class="login-card">
    <div class="card-title">Welcome back</div>
    <div class="card-subtitle">G-AXIS OPS 계정으로 로그인하세요</div>

    <div class="form-group">
      <label class="form-label">이메일 / 아이디</label>
      <div class="input-wrap">
        <input type="text" class="form-input" placeholder="name@gst-in.com" autocomplete="email">
        <div class="input-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2.25 4.5l6.75 4.5 6.75-4.5M3.75 13.5h10.5c.828 0 1.5-.672 1.5-1.5V6c0-.828-.672-1.5-1.5-1.5H3.75c-.828 0-1.5.672-1.5 1.5v6c0 .828.672 1.5 1.5 1.5z"/></svg>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <div class="input-wrap">
        <input type="password" class="form-input" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
        <div class="input-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4.5" y="8.25" width="9" height="7.5" rx="1.5"/><path d="M6.75 8.25V5.625a2.25 2.25 0 014.5 0V8.25"/></svg>
        </div>
        <div class="input-icon-right">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1.5 9s3-5.25 7.5-5.25S16.5 9 16.5 9s-3 5.25-7.5 5.25S1.5 9 1.5 9z"/><circle cx="9" cy="9" r="2.25"/></svg>
        </div>
      </div>
    </div>

    <div class="form-row">
      <label class="checkbox-wrap">
        <input type="checkbox" checked>
        <span class="checkbox-label">로그인 유지</span>
      </label>
      <a href="#" class="forgot-link">비밀번호 찾기</a>
    </div>

    <button class="login-btn">로그인</button>

    <!-- Feature Badges -->
    <div class="feature-row">
      <div class="feature-item">
        <div class="feature-icon accent">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="3" y="3" width="6" height="6" rx="1"/>
            <rect x="11" y="3" width="6" height="6" rx="1"/>
            <rect x="3" y="11" width="6" height="6" rx="1"/>
            <rect x="11" y="11" width="6" height="6" rx="1"/>
          </svg>
        </div>
        <span class="feature-label">QR Scan</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon teal">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h6a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="7" y="2" width="6" height="3" rx="1"/>
            <path d="M7 12h6M7 15h4"/>
          </svg>
        </div>
        <span class="feature-label">Task Mgmt</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon blue">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="10" cy="10" r="7"/>
            <polyline points="10 6 10 10 13 13"/>
          </svg>
        </div>
        <span class="feature-label">Real-time</span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer-section">
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span class="status-label">System Online</span>
    </div>
    <p class="register-text">
      계정이 없으신가요?<a href="#" class="register-link">회원가입</a>
    </p>
    <div class="version-text">G-AXIS OPS v1.0.0</div>
  </div>

</div>

</body>
</html>
