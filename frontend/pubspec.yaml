name: gaxis_app
description: "G-axis Manufacturing Task Management App"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8  # iOS 아이콘 폰트
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  dio: ^5.3.0
  shared_preferences: ^2.2.2  # 웹 호환 로컬 저장소 (sqflite 대체)
  web_socket_channel: ^2.4.0  # 웹 호환 WebSocket
  flutter_secure_storage: ^9.0.0  # 웹 호환 (JWT 토큰 저장)
  json_annotation: ^4.8.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
